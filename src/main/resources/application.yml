spring:
  application:
    name: yu-ai-agent
  profiles:
    active: local
  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
    dashscope:
      api-key: 
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v1

server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.teacup.teacupaiagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn


logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG

